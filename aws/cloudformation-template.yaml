              req.end();
            });
          };

  # EventBridge Rule - Monthly on 1st at 6 AM UTC (10 PM PST previous day)
  MonthlyAnalysisScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub 'monthly-analysis-schedule-${Environment}'
      Description: Triggers monthly Opus analysis on the 1st at 6 AM UTC
      ScheduleExpression: 'cron(0 6 1 * ? *)'
      State: ENABLED
      Targets:
        - Id: MonthlyAnalysisTarget
          Arn: !GetAtt MonthlyAnalysisScheduledFunction.Arn

  # Permission for EventBridge to invoke Monthly Lambda
  MonthlyAnalysisSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MonthlyAnalysisScheduledFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt MonthlyAnalysisScheduleRule.Arn

  # CloudWatch Log Groups for Monthly Analysis
  MonthlyScheduledFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/monthly-analysis-scheduled-${Environment}'
      RetentionInDays: 90

  MonthlyManualFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/monthly-analysis-manual-${Environment}'
      RetentionInDays: 90

  # CloudWatch Alarm for Monthly Analysis failures
  MonthlyAnalysisFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'monthly-analysis-failure-${Environment}'
      AlarmDescription: Alerts when monthly Opus analysis Lambda fails
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref MonthlyAnalysisScheduledFunction

Outputs:
  # Daily Learning Outputs
  DailyScheduledFunctionArn:
    Description: ARN of the daily scheduled Lambda function
    Value: !GetAtt DailyLearningScheduledFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DailyScheduledFunctionArn'

  DailyManualFunctionArn:
    Description: ARN of the daily manual trigger Lambda function
    Value: !GetAtt DailyLearningManualFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DailyManualFunctionArn'

  DailyScheduleRuleArn:
    Description: ARN of the daily EventBridge schedule rule
    Value: !GetAtt DailyLearningScheduleRule.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DailyScheduleRuleArn'

  # Monthly Analysis Outputs
  MonthlyScheduledFunctionArn:
    Description: ARN of the monthly Opus analysis Lambda function
    Value: !GetAtt MonthlyAnalysisScheduledFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-MonthlyScheduledFunctionArn'

  MonthlyManualFunctionArn:
    Description: ARN of the monthly manual trigger Lambda function
    Value: !GetAtt MonthlyAnalysisManualFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-MonthlyManualFunctionArn'

  MonthlyScheduleRuleArn:
    Description: ARN of the monthly EventBridge schedule rule
    Value: !GetAtt MonthlyAnalysisScheduleRule.Arn
    Export:
      Name: !Sub '${AWS::StackName}-MonthlyScheduleRuleArn'
