version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Create .env.production file with runtime environment variables
        # Find your App ID in AWS Amplify Console > App settings > General
        - echo "AMPLIFY_APP_ID=$AMPLIFY_APP_ID" >> .env.production
        # Database
        - echo "DATABASE_URL=$DATABASE_URL" >> .env.production
        # AWS Cognito (NEXT_PUBLIC_ prefix makes them available client-side)
        - echo "NEXT_PUBLIC_AWS_REGION=$NEXT_PUBLIC_AWS_REGION" >> .env.production
        - echo "NEXT_PUBLIC_COGNITO_USER_POOL_ID=$NEXT_PUBLIC_COGNITO_USER_POOL_ID" >> .env.production
        - echo "NEXT_PUBLIC_COGNITO_CLIENT_ID=$NEXT_PUBLIC_COGNITO_CLIENT_ID" >> .env.production
        - echo "NEXT_PUBLIC_COGNITO_IDENTITY_POOL_ID=$NEXT_PUBLIC_COGNITO_IDENTITY_POOL_ID" >> .env.production
        # S3/IAM credentials (kept as S3_ prefix to avoid polluting the SDK
        # default credential chain — AWS_ACCESS_KEY_ID would shadow the
        # Amplify compute role used by Secrets Manager for password rotation)
        - echo "S3_ACCESS_KEY_ID=$S3_ACCESS_KEY_ID" >> .env.production
        - echo "S3_SECRET_ACCESS_KEY=$S3_SECRET_ACCESS_KEY" >> .env.production
        - echo "S3_REGION=$S3_REGION" >> .env.production
        - echo "S3_BUCKET_NAME=$S3_BUCKET_NAME" >> .env.production
        # API Keys
        - echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" >> .env.production
        - echo "SERPAPI_API_KEY=$SERPAPI_API_KEY" >> .env.production
        # DynamoDB
        - echo "DYNAMODB_QR_TABLE=$DYNAMODB_QR_TABLE" >> .env.production
        - echo "DYNAMODB_CLICKS_TABLE=$DYNAMODB_CLICKS_TABLE" >> .env.production
        # QR Code
        - echo "QR_REDIRECT_BASE_URL=$QR_REDIRECT_BASE_URL" >> .env.production
        # Legacy Auth (if still used)
        - echo "AUTH_ADMIN_HASH=$AUTH_ADMIN_HASH" >> .env.production
        - echo "AUTH_ANALYST_HASH=$AUTH_ANALYST_HASH" >> .env.production
        # Learning API (for Lambda-triggered autonomous learning)
        - echo "LEARNING_API_KEY=$LEARNING_API_KEY" >> .env.production
        # Voyage AI (for semantic vector search over business insights)
        - echo "VOYAGE_API_KEY=$VOYAGE_API_KEY" >> .env.production
        # Step Functions (for learning pipeline orchestration)
        - echo "STEP_FUNCTIONS_ARN=$STEP_FUNCTIONS_ARN" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
